# TEMPLATE — copy to .github/workflows/pr-review.yml in your repo.
#
# Uses Bun as the runtime — faster CI startup (~1s install), no build step needed.
# claude-token-proxy runs directly from TypeScript source via Bun.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   CLAUDE_PROXY_PRIVATE_KEY  — contents of your private.pem
#   CLAUDE_PROXY_URL          — public URL of your machine, e.g. http://1.2.3.4:7432

name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: Claude PR Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR repo
        uses: actions/checkout@v4

      - name: Checkout claude-token-proxy
        uses: actions/checkout@v4
        with:
          repository: prince-kunwar-xcelore/claude-token-proxy
          path: _claude-token-proxy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install claude-token-proxy deps
        run: cd _claude-token-proxy && bun install

      - name: Checkout claude-audit-tool
        uses: actions/checkout@v4
        with:
          repository: prince-kunwar-xcelore/claude-audit-tool
          path: _claude-audit-tool

      - name: Install and build claude-audit-tool
        run: |
          cd _claude-audit-tool && bun install
          bun install -g _claude-audit-tool

      - name: Install Claude CLI
        run: bun install -g @anthropic-ai/claude-code

      - name: Run PR Review
        env:
          CLAUDE_PROXY_PRIVATE_KEY: ${{ secrets.CLAUDE_PROXY_PRIVATE_KEY }}
          PROXY_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude-audit-tool "${{ github.event.pull_request.html_url }}" \
            --auth-token "bun ${{ github.workspace }}/_claude-token-proxy/src/index.ts decrypt-token"
